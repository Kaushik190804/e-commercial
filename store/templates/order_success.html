<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful | Global Mart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            padding: 20px;
        }
        
        .success-card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            text-align: center;
            max-width: 450px; 
            width: 100%;
        }
        
        /* Added a small pulse animation for the checkmark */
        .icon-circle { 
            width: 80px; 
            height: 80px; 
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 3em; 
            margin: 0 auto 25px;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h1 { 
            color: #1e3c72; 
            margin-bottom: 15px;
            font-size: 2em;
        }
        
        p { 
            color: #666; 
            line-height: 1.6; 
            margin-bottom: 30px;
            font-size: 0.95em;
        }
        
        .btn-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        
        .btn { 
            padding: 14px 25px; 
            border-radius: 6px; 
            border: none; 
            cursor: pointer; 
            text-decoration: none; 
            font-size: 1em; 
            transition: all 0.3s; 
            font-weight: 600; 
            text-align: center;
        }
        
        .btn-home { 
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.2);
        }
        
        .btn-home:hover {
            background: linear-gradient(135deg, #229954 0%, #1e8449 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.3);
        }
        
        .btn-orders { 
            background: white;
            color: #1e3c72; 
            border: 2px solid #1e3c72;
        }
        
        .btn-orders:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        /* Tablet Responsive (max-width: 768px) */
        @media (max-width: 768px) {
            .success-card {
                padding: 25px;
            }

            .icon-circle {
                width: 70px;
                height: 70px;
                font-size: 2.5em;
                margin: 0 auto 20px;
            }

            h1 {
                font-size: 1.6em;
                margin-bottom: 12px;
            }

            p {
                font-size: 0.9em;
                margin-bottom: 25px;
            }

            .btn {
                padding: 12px 20px;
                font-size: 0.95em;
            }
        }

        /* Mobile Responsive (max-width: 480px) */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .success-card {
                padding: 20px;
                border-radius: 10px;
            }

            .icon-circle {
                width: 60px;
                height: 60px;
                font-size: 2em;
                margin: 0 auto 15px;
            }

            h1 {
                font-size: 1.3em;
                margin-bottom: 10px;
            }

            p {
                font-size: 0.85em;
                margin-bottom: 20px;
                line-height: 1.5;
            }

            .btn-group {
                gap: 10px;
            }

            .btn {
                padding: 12px 18px;
                font-size: 0.9em;
                border-radius: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-circle">✓</div>
        <h1>Success!</h1>
        <p>Your order has been placed successfully. Thank you for shopping with <strong>Global Mart</strong>. We are now processing your items for delivery!</p>
        
        <div class="btn-group">
            <a href="{% url 'product_list' %}" class="btn btn-home">Continue Shopping</a>
            <a href="{% url 'profile' %}" class="btn btn-orders">View My Orders</a>
        </div>
    </div>

</body>
</html>
