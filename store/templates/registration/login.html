<!DOCTYPE html>
<html>
<head>
    <title>Login | E bazzar</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .login-box h2 { color: #2c3e50; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; background-color: #2c3e50; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn:hover { background-color: #34495e; }
        .errorlist { color: #e74c3c; list-style: none; padding: 0; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>E bazzar Login</h2>
        
        <form method="post">
            {% csrf_token %}
            
            {% if form.errors %}
                <p class="errorlist">Your username or password was incorrect. Please try again.</p>
            {% endif %}

            {{ form.username.label_tag }}
            {{ form.username }}
            
            {{ form.password.label_tag }}
            {{ form.password }}

            <button type="submit" class="btn">Login</button>
        </form>

        <p style="margin-top: 20px; font-size: 14px;">
            New here? <a href="{% url 'signup' %}" style="color: #3498db; text-decoration: none;">Create an account</a>
        </p>
    </div>
</body>
</html>
