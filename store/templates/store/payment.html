<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment | Global Mart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        
        .payment-card { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 450px;
        }
        
        h1 {
            text-align: center;
            font-size: 1.8em;
            color: #1e3c72;
            margin-bottom: 25px;
        }
        
        .total-box { 
            background: #e8f5e9; 
            padding: 20px; 
            border-radius: 8px; 
            text-align: center; 
            margin-bottom: 25px;
            border: 2px solid #27ae60;
        }
        
        .total-box p { 
            margin: 0 0 8px 0;
            color: #666; 
            font-size: 0.95em;
        }
        
        .total-box h2 { 
            margin: 0; 
            color: #27ae60;
            font-size: 2em;
        }
        
        .form-group { 
            margin-bottom: 18px; 
        }
        
        label { 
            display: block; 
            margin-bottom: 6px; 
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }
        
        input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e0e0e0; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 1em;
            letter-spacing: 1px; 
            outline: none; 
            transition: 0.3s;
            font-family: inherit;
        }
        
        input:focus { 
            border-color: #2a5298; 
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 12px;
        }
        
        .btn-pay { 
            width: 100%; 
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            color: white; 
            padding: 14px; 
            border: none; 
            border-radius: 6px; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 1em; 
            transition: all 0.3s; 
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.2);
        }
        
        .btn-pay:hover { 
            background: linear-gradient(135deg, #229954 0%, #1e8449 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.3);
        }

        /* Tablet Responsive (max-width: 768px) */
        @media (max-width: 768px) {
            .payment-card {
                padding: 25px;
                border-radius: 12px;
            }

            h1 {
                font-size: 1.4em;
                margin-bottom: 20px;
            }

            .total-box {
                padding: 15px;
                margin-bottom: 20px;
            }

            .total-box h2 {
                font-size: 1.6em;
            }

            .form-group {
                margin-bottom: 14px;
            }

            label {
                font-size: 0.9em;
            }

            input {
                padding: 10px;
                font-size: 0.95em;
            }

            .btn-pay {
                padding: 12px;
                font-size: 0.95em;
            }
        }

        /* Mobile Responsive (max-width: 480px) */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .payment-card {
                padding: 15px;
                border-radius: 10px;
            }

            h1 {
                font-size: 1.2em;
                margin-bottom: 15px;
            }

            .total-box {
                padding: 12px;
                margin-bottom: 15px;
            }

            .total-box p {
                font-size: 0.85em;
                margin-bottom: 5px;
            }

            .total-box h2 {
                font-size: 1.4em;
            }

            .form-group {
                margin-bottom: 12px;
            }

            label {
                font-size: 0.85em;
                margin-bottom: 4px;
            }

            input {
                padding: 10px;
                font-size: 16px;
                border-radius: 4px;
            }

            .form-row {
                gap: 10px;
            }

            .btn-pay {
                padding: 12px;
                font-size: 0.9em;
                margin-top: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="payment-card">
        <h1>Secure Checkout</h1>
        <div class="total-box">
            <p>Amount to Pay</p>
            <h2>₹{{ total_price }}</h2>
        </div>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Card Number</label>
                <input type="text" id="card_number" placeholder="0000 0000 0000 0000" required maxlength="19">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="text" id="expiry_date" placeholder="MM/YY" required maxlength="5">
                </div>
                <div class="form-group">
                    <label>CVV</label>
                    <input type="password" placeholder="***" required maxlength="3">
                </div>
            </div>
            <button type="submit" class="btn-pay">Pay Now</button>
        </form>
    </div>

    <script>
        // --- 1. CARD NUMBER LOGIC ---
        const cardInput = document.getElementById('card_number');
        cardInput.addEventListener('input', (e) => {
            // Remove everything except numbers
            let value = e.target.value.replace(/\D/g, '');
            // Group into 4s and join with a space
            let formatted = value.match(/.{1,4}/g);
            e.target.value = formatted ? formatted.join(' ') : value;
        });

        // --- 2. EXPIRY DATE LOGIC ---
        const expiryInput = document.getElementById('expiry_date');
        expiryInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, ''); // Numbers only
            
            if (value.length >= 1) {
                // If first digit is 2-9, it's a single digit month, auto-prefix with 0
                if (parseInt(value[0]) > 1 && value.length === 1) {
                    value = '0' + value;
                }
            }

            if (value.length >= 2) {
                let month = parseInt(value.substring(0, 2));
                // Cap month at 12 and floor at 01
                if (month > 12) {
                    value = '12' + value.substring(2);
                } else if (month === 0) {
                    value = '01' + value.substring(2);
                }
                
                // Always add the slash if we have 2 or more digits
                e.target.value = value.substring(0, 2) + '/' + value.substring(2, 4);
            } else {
                e.target.value = value;
            }
        });

        // Specific fix for Backspacing over the slash
        expiryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && expiryInput.value.length === 3) {
                // If at "MM/", delete the second digit of the month too
                expiryInput.value = expiryInput.value.substring(0, 2);
            }
        });
    </script>
</body>
</html>
